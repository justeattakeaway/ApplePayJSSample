name: update-dotnet-sdk

on:
  schedule:
    - cron:  '00 19 * * TUE'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-sdk:
    uses: martincostello/update-dotnet-sdk/.github/workflows/update-dotnet-sdk.yml@7f7b459c48652a0e24f154bbe6dc16a5c7409b1b # v5.0.2
    with:
      labels: "dependencies,.NET"
      user-email: ${{ vars.UPDATER_COMMIT_USER_EMAIL }}
      user-name: ${{ vars.UPDATER_COMMIT_USER_NAME }}
    secrets:
      application-id: ${{ secrets.UPDATER_APPLICATION_ID }}
      application-private-key: ${{ secrets.UPDATER_APPLICATION_PRIVATE_KEY }}
